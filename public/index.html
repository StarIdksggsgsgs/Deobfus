<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>45MS DEOBFUSCATOR</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body{background:#0d0d0d;color:#fff;font-family:Arial,sans-serif;text-align:center;padding:20px;}
.container{max-width:800px;margin:auto;}
h1{color:#00ffcc;}
textarea{width:100%;height:200px;background:#111;color:#0f0;border:1px solid #333;padding:10px;margin-top:10px;}
#dropArea{border:2px dashed #00ffcc;padding:30px;margin-top:10px;cursor:pointer;}
button{margin-top:15px;padding:10px 20px;background:#00ffcc;border:none;cursor:pointer;font-weight:bold;}
button:hover{background:#00ccaa;}
#status{margin-top:15px;color:#aaa;}
a.download{display:block;margin-top:20px;color:#00ffcc;}
</style>
</head>
<body>
<div class="container">
<h1>45MS DEOBFUSCATOR</h1>
<div id="dropArea">Drag & Drop your Lua file here or click to select</div>
<input type="file" id="fileInput" style="display:none">
<textarea id="codeInput" placeholder="Or paste your Lua code here..."></textarea>
<button onclick="deobfuscate()">DEOBFUSCATE</button>
<div id="status"></div>
<a id="downloadLink" class="download" style="display:none;">Download Result</a>
</div>

<script>
const dropArea=document.getElementById("dropArea")
const fileInput=document.getElementById("fileInput")

dropArea.addEventListener("click",()=>fileInput.click())
dropArea.addEventListener("dragover",e=>{e.preventDefault();dropArea.style.borderColor="#00ccaa"})
dropArea.addEventListener("dragleave",()=>{dropArea.style.borderColor="#00ffcc"})
dropArea.addEventListener("drop",e=>{
    e.preventDefault()
    dropArea.style.borderColor="#00ffcc"
    if(e.dataTransfer.files.length>0)fileInput.files=e.dataTransfer.files
})

async function deobfuscate(){
    const status=document.getElementById("status")
    const codeInput=document.getElementById("codeInput")
    const downloadLink=document.getElementById("downloadLink")
    status.innerText="Deobfuscating..."
    downloadLink.style.display="none"
    let code=""
    if(fileInput.files.length>0)code=await fileInput.files[0].text()
    else code=codeInput.value
    if(!code){status.innerText="No input provided.";return}
    try{
        let res=await fetch("/deobf",{method:"POST",body:code})
        if(!res.ok)throw new Error(await res.text())
        let renamedCode=await res.text()
        const blob=new Blob([renamedCode],{type:"text/plain"})
        const url=URL.createObjectURL(blob)
        downloadLink.href=url
        downloadLink.download="deobf_"+Math.floor(Math.random()*999999999)+".lua"
        downloadLink.style.display="block"
        status.innerText="Done!"
    }catch(err){status.innerText="Error: "+err.message}
}
</script>
</body>
</html>
